<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="\public\vite.svg" />
  <title>Lam quen chu viet</title>
  <style>
    * {
      margin: 0 !important;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-image: url('assets/images/bg/background_game.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .ui-btn {
      position: absolute;
      /* width: 5%; /* chuẩn PC */
      /* height: auto; */
      z-index: 9999;
      cursor: pointer;
      user-select: none;
      touch-action: none;
    }

    /* Reset: góc trên trái */
    #btn-reset {
      top: 2%;
      right: 2%;
    }

    .ui-btn:hover {
      transform: scale(1.12);
      transition: 0.15s;
    }
  </style>
</head>

<body>
  <div id="game-container"></div>
  <img id="btn-reset" class="ui-btn" src="assets/images/ui/btn_reset.png" alt="Reset" />
  <script type="module" src="src/main.ts"></script>
</body>

</html>
